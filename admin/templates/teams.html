{% extends "admin_layout.html" %} {% block content %}
<div class="content-wrapper">
  <div class="page-header">
    <h3 class="page-title">Teams</h3>
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="/admin">Admin</a></li>
        <li class="breadcrumb-item active" aria-current="page">Manage Teams</li>
      </ol>
    </nav>
  </div>

  <div class="d-flex flex-column justify-content-center align-items-center">
    <div
      class="d-flex justify-content-center align-items-center col-lg-10 mb-5"
    >
      <div class="input-group">
        <div class="input-group-prepend">
          <span class="input-group-text"
            ><i class="mdi mdi-account-search"></i
          ></span>
        </div>
        <input
          type="text"
          class="form-control text-white"
          placeholder="Search Team"
          aria-label="Search Team"
          aria-describedby="basic-addon1"
        />
      </div>
      <div class="w-25">
        <a href="manage_users/new_user" class="">
          <button
            type="button"
            class="d-flex align-items-center justify-content-center px-4 py-2 rounded border-0 outline-0 text-danger"
          >
            <span>
              <i class="h4 mdi mdi-library-plus px-2"></i>
            </span>

            <span class="">Add Team</span>
          </button>
        </a>
      </div>
    </div>
    <div class="col-lg-10 grid-margin stretch-card">
      <div class="card">
        <div class="card-body">
          <h4 class="card-title">Teams</h4>
          <div class="table-responsive">
            <table class="table table-hover">
              <thead>
                <tr>
                  <th>Team Name</th>
                  <th>Leader</th>
                  <th>Status</th>
                  <th></th>
                </tr>
              </thead>
              <tbody class="text-white">
                <tr>
                  <td>Team one</td>
                  <td>jacod</td>
                  <td class="text-danger">Active</td>
                  <td>
                    <div
                      class="btn-group"
                      role="group"
                      aria-label="Basic example"
                    >
                      <a href="manage_users/delete_user?id=111">
                        <button type="button" class="btn btn-secondary">
                          <i class="mdi mdi-eye"></i></button
                      ></a>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
