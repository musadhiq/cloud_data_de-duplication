{% extends "admin_layout.html" %} {% block content %}
<div class="content-wrapper">
  <div class="page-header">
    <h3 class="page-title">Manage Users</h3>
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="/admin">Admin</a></li>
        <li class="breadcrumb-item active" aria-current="page">Manage Users</li>
      </ol>
    </nav>
  </div>

  <div class="d-flex flex-column justify-content-center align-items-center">
    <a href="manage_users/new_user" class="col-lg-10">
      <button type="button" class="btn btn-secondary btn-md btn-block">
        <i class="h4 mdi mdi-account-plus"></i
        ><span class="">Click to Add New User</span>
      </button>
    </a>
    <div class="col-lg-10 grid-margin stretch-card">
      <div class="card">
        <div class="card-body">
          <h4 class="card-title">User Details</h4>
          <div class="table-responsive">
            <table class="table table-hover">
              <thead>
                <tr>
                  <th>User</th>
                  <th>Email</th>
                  <th>Role</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Jacob</td>
                  <td>jacod@text.com</td>
                  <td class="text-danger">Leader</td>
                  <td>
                    <div
                      class="btn-group"
                      role="group"
                      aria-label="Basic example"
                    >
                      <a href="manage_users/edit_user?id=111" class="pr-4"
                        ><button type="button" class="btn btn-secondary">
                          <i class="mdi mdi-tooltip-edit"></i></button
                      ></a>
                      <a href="manage_users/delete_user?id=111">
                        <button type="button" class="btn btn-primary">
                          <i class="mdi mdi-delete-variant"></i></button
                      ></a>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
