{% extends "admin_layout.html" %} {% block content %}
<div class="content-wrapper">
  <div class="page-header">
    <h3 class="page-title">Add Work</h3>
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb">
        <li class="breadcrumb-item">
          <a href="/admin/manage_teams">Teams</a>
        </li>
        <li class="breadcrumb-item active" aria-current="page">Add Team</li>
      </ol>
    </nav>
  </div>
  <div class="row d-flex justify-content-center">
    <div class="col-md-6 grid-margin stretch-card">
      <div class="card">
        <div class="card-body">
            <form action="">
            <h4 class="card-title">Create New Team</h4>
            <div class="form-group">
                <label >Team Name</label>
                <input
                  type="text"
                  class="form-control text-light"
                  name="teamname"
                  placeholder="team Name"
                />
            </div>
          <div class="form-group">
            <label>Select Leader</label>
            <select  style="width: 100%" class="form-control text-light">
              <option value="AL">Alabama</option>
              <option value="WY">Wyoming</option>
              <option value="AM">America</option>
              <option value="CA">Canada</option>
              <option value="RU">Russia</option>
            </select>
          </div>
          <div class="form-group">
            <label>Add Members</label>

            <div class="selectbox">
                <div class="d-flex member-flexbox">
                    <div class="selected-users my-2">
                        <h1 class=" bg-grey user-select" ><i class="mdi mdi-account-plus"></i></h1>

                    </div>
                </div>
                <div class="user-list ">
                    <h2 class=" bg-grey user-select-inner d-flex  flex-column" ><i class=" mdi mdi-account-plus"></i> <span class="username">username</span></h2>
                    <h2 class=" bg-grey user-select-inner d-flex  flex-column" ><i class=" mdi mdi-account-plus"></i> <span class="username">username</span></h2>
                    <h2 class=" bg-grey user-select-inner d-flex  flex-column" ><i class=" mdi mdi-account-plus"></i> <span class="username">username</span></h2>
                    <h2 class=" bg-grey user-select-inner d-flex  flex-column" ><i class=" mdi mdi-account-plus"></i> <span class="username">username</span></h2>
                </div>
            </div>
          </div>
          <button class="btn btn-dark">Cancel</button>
          <button type="submit" class="btn btn-primary mr-2">Create</button>
        </form>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
    const selectbox = document.querySelector(".user-list");
        const selectUser = document.querySelector(".user-select");
        const selectedUsers = document.querySelector(".selected-users");
        const selectUserOne = document.querySelectorAll(".user-select-inner");
        selectUser.addEventListener("click", function () {
           selectbox.classList.toggle("open")
        })

        selectUserOne.forEach((select)=>{
            select.addEventListener("click", function () {
                const html = `<div class="user-selected">
                    <img src="https://picsum.photos/200" alt="" class="user-avatar">
                    <span class="username">username</span>
                    </div>`

               const el =  document.createElement("div");
                el.innerHTML = html;
                selectedUsers.appendChild(el)

            selectbox.classList.remove("open")
        })
        })
        

</script>
{% endblock %}
