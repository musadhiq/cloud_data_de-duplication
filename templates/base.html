<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.3/socket.io.js"
      integrity="sha512-iWPnCISAd/J+ZacwV2mbNLCaPGRrRo5OS81lKTVPtRg1wGTC20Cfmp5Us5RcbLv42QLdbAWl0MI57yox5VecQg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>

    <link
      rel="stylesheet"
      href="{{url_for('static',filename ='vendors/mdi/css/materialdesignicons.min.css')}}"
    />
    <link
      rel="stylesheet"
      href="{{url_for('static',filename ='vendors/css/vendor.bundle.base.css')}}"
    />
    <link
      rel="stylesheet"
      href="{{url_for('static',filename ='vendors/jvectormap/jquery-jvectormap.css')}}"
    />
    <link
      rel="stylesheet"
      href="{{url_for('static',filename ='vendors/owl-carousel-2/owl.theme.default.min.css')}}"
    />
    <link
      rel="stylesheet"
      href="{{url_for('static',filename ='vendors/flag-icon-css/css/flag-icon.min.css')}}"
    />
    <link
      rel="stylesheet"
      href="{{url_for('static',filename ='vendors/owl-carousel-2/owl.carousel.min.css')}}"
    />
    <link
      rel="stylesheet"
      href="{{url_for('static',filename ='style/style.css')}}"
    />
    <style>
      .content-wrapper {
        background-color: rgba(0, 0, 0, 0.493);
      }
      .main-panel::-webkit-scrollbar {
        width: 0.5em;
        background-color: white;
      }
      .main-panel::-webkit-scrollbar-button {
        display: none;
      }
      .main-panel::-webkit-scrollbar-thumb {
        background-color: #18b3c2;
        border-radius: 10px;
      }
      @keyframes pulse {
        0% {
          transform: translate(0) scale(1);
        }
        35% {
          transform: translate(50px, 50px) scale(1.1);
        }
        70% {
          transform: translate(-50px) scale(0.9);
        }
        100% {
          transform: translate(0) scale(1);
        }
      }

      .pulse {
        animation: pulse 10s infinite;
      }
      .delay-1 {
        animation-delay: 1s;
      }
      .delay-2 {
        animation-delay: 2s;
      }
      .delay-3 {
        animation-delay: 3s;
      }
      .logo {
        letter-spacing: 3px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue",
          sans-serif;
      }
      .logo:hover {
        text-decoration: none;
      }
    </style>
    <title>{% block title %} {% endblock %}</title>
  </head>
  <body>
    {% block body %} {% endblock %}
    <!-- container-scroller -->
    <!-- plugins:js -->
    <script src="{{url_for('static',filename = 'vendors/js/vendor.bundle.base.js')}}"></script>
    <script src="{{url_for('static',filename = 'js/off-canvas.js')}}"></script>
    <script src="{{url_for('static',filename = 'js/hoverable-collapse.js')}}"></script>
    <script src="{{url_for('static',filename = 'js/misc.js')}}"></script>
    <script src="{{url_for('static',filename = 'js/settings.js')}}"></script>
    <script src="{{url_for('static',filename = 'js/todolist.js')}}"></script>
  </body>
</html>
